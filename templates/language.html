<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#C1440E">
  <title>KaamMitr — Choose Language</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }

    .lang-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #2C1A0E 0%, #C1440E 55%, #F5A623 100%);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .lang-screen::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(255,255,255,.04);
      top: -180px; right: -180px; pointer-events: none;
    }
    .lang-screen::after {
      content: '';
      position: absolute;
      width: 350px; height: 350px; border-radius: 50%;
      background: rgba(255,255,255,.04);
      bottom: -120px; left: -100px; pointer-events: none;
    }

    .lang-card {
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(44,26,14,.35);
      padding: 44px 36px 36px;
      width: 100%; max-width: 420px;
      text-align: center;
      position: relative; z-index: 1;
      animation: card-rise .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes card-rise {
      from { opacity:0; transform:translateY(40px) scale(.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .brand-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #C1440E, #F5A623);
      border-radius: 50% 50% 50% 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(193,68,14,.35);
      transform: rotate(-8deg);
    }
    .lang-card h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2rem; font-weight: 900;
      color: #2C1A0E; margin-bottom: 6px;
    }
    .lang-card .tagline {
      font-size: .82rem; color: #7A6859;
      margin-bottom: 28px; line-height: 1.6;
    }

    .lang-options { display: flex; flex-direction: column; gap: 12px; }

    .lang-opt {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 18px 20px;
      border-radius: 16px; border: 2px solid #DDD1C3;
      background: #FEFCFA; cursor: pointer;
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      text-align: left; position: relative; overflow: hidden;
    }
    .lang-opt:hover {
      border-color: #C1440E;
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 24px rgba(193,68,14,.18);
      background: #FDF0E8;
    }
    .lang-opt.selected {
      border-color: #C1440E;
      background: #FDF0E8;
      box-shadow: 0 6px 20px rgba(193,68,14,.22);
    }

    .lang-flag {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
      background: #F7F0E6; transition: transform .2s;
    }
    .lang-opt:hover .lang-flag,
    .lang-opt.selected .lang-flag { transform: scale(1.1) rotate(-5deg); }

    .lang-text { flex: 1; }
    .lang-name-main  { font-weight: 700; font-size: 1rem; color: #2C1A0E; display: block; }
    .lang-name-native{ font-size: .8rem; color: #7A6859; display: block; margin-top: 2px; }

    .lang-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #DDD1C3;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: transparent;
      transition: all .2s; flex-shrink: 0;
    }
    .lang-opt.selected .lang-check {
      background: #C1440E; border-color: #C1440E; color: #fff;
    }

    .btn-continue {
      width: 100%; margin-top: 20px; padding: 18px;
      font-size: 1.05rem; font-weight: 700; border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #C1440E, #E8521A);
      color: #fff; cursor: pointer;
      box-shadow: 0 6px 20px rgba(193,68,14,.35);
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      display: none; align-items: center; justify-content: center; gap: 10px;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .btn-continue:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(193,68,14,.45); }
    .btn-continue:active { transform: scale(.97); }
    .btn-continue.visible {
      display: flex;
      animation: btn-pop .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes btn-pop { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

    .lang-note { margin-top: 14px; font-size: .72rem; color: #7A6859; }

    @media (max-width: 480px) {
      .lang-card { padding: 32px 20px 28px; border-radius: 22px; }
      .lang-card h1 { font-size: 1.6rem; }
      .lang-opt { padding: 15px 16px; }
    }
  </style>
</head>
<body>
<div class="lang-screen">
  <div class="lang-card">
    <div class="brand-logo">🌾</div>
    <h1>KaamMitr</h1>
    <p class="tagline">
      अपनी भाषा चुनें<br>
      Choose your language<br>
      మీ భాషను ఎంచుకోండి
    </p>

    <div class="lang-options">

      <button class="lang-opt" id="opt-hi" onclick="selectLang('hi', this)">
        <div class="lang-flag">🇮🇳</div>
        <div class="lang-text">
          <span class="lang-name-main">हिन्दी</span>
          <span class="lang-name-native">Hindi — भारत की राष्ट्रभाषा</span>
        </div>
        <div class="lang-check">✓</div>
      </button>

      <button class="lang-opt" id="opt-en" onclick="selectLang('en', this)">
        <div class="lang-flag">🇬🇧</div>
        <div class="lang-text">
          <span class="lang-name-main">English</span>
          <span class="lang-name-native">International language</span>
        </div>
        <div class="lang-check">✓</div>
      </button>

      <button class="lang-opt" id="opt-te" onclick="selectLang('te', this)">
        <div class="lang-flag">🌿</div>
        <div class="lang-text">
          <span class="lang-name-main">తెలుగు</span>
          <span class="lang-name-native">Telugu — ఆంధ్రప్రదేశ్ · తెలంగాణ</span>
        </div>
        <div class="lang-check">✓</div>
      </button>

    </div>

    <button class="btn-continue" id="btn-continue" onclick="proceed()">
      <span id="continue-txt">Continue</span>
      <span>→</span>
    </button>

    <p class="lang-note" id="lang-note">Select a language to continue</p>
  </div>
</div>

<script>
  // ── Inline helpers (no app.js dependency on this standalone page) ──
  const CONTINUE_LABELS = { hi: 'आगे बढ़ें →', en: 'Continue →', te: 'కొనసాగించు →' };
  const NOTES = {
    hi: '✦ आपकी भाषा सेव हो जाएगी',
    en: '✦ Your language preference will be saved',
    te: '✦ మీ భాష సేవ్ చేయబడుతుంది'
  };

  let chosenLang = null;

  function selectLang(lang, btn) {
    chosenLang = lang;
    // Deselect all, select clicked
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Show continue button
    const cb = document.getElementById('btn-continue');
    cb.classList.add('visible');
    document.getElementById('continue-txt').textContent = CONTINUE_LABELS[lang] || 'Continue →';
    document.getElementById('lang-note').textContent    = NOTES[lang] || '';
  }

  function proceed() {
    if (!chosenLang) return;
    localStorage.setItem('km_lang', chosenLang);
    const card = document.querySelector('.lang-card');
    card.style.transition = 'all .3s ease';
    card.style.transform  = 'scale(.95)';
    card.style.opacity    = '0';
    setTimeout(() => {
      const next = new URLSearchParams(location.search).get('next') || '/login';
      window.location.href = next;
    }, 280);
  }

  // NO auto-skip — always show language page so user can pick/confirm language
  // The guard in base.html sends users here when km_lang is missing.
  // After selecting, km_lang is saved and user proceeds normally.
</script>
</body>
</html>
