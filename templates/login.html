{% extends "base.html" %}
{% block title %}KaamMitr — Login{% endblock %}
{% block head %}
<style>
html, body { height: 100%; }

.login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(145deg, #FDF0E8 0%, #FFF8EC 60%, #E8F5EE 100%);
  padding: 20px; position: relative;
}
.login-screen::before {
  content: ''; position: absolute;
  width: 400px; height: 400px; border-radius: 50%;
  background: rgba(193,68,14,.05); top: -100px; right: -100px; pointer-events: none;
}

.login-card {
  background: var(--white); border-radius: 28px;
  box-shadow: 0 20px 60px rgba(44,26,14,.14);
  padding: 44px 36px 36px; width: 100%; max-width: 420px;
  position: relative; z-index: 1;
  animation: card-rise .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes card-rise {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Header */
.login-header { text-align: center; margin-bottom: 32px; }
.login-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #C1440E, #F5A623);
  border-radius: 50% 50% 50% 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(193,68,14,.3);
  transform: rotate(-8deg);
}
.login-header h2 {
  font-family: var(--font-display); font-size: 1.7rem;
  font-weight: 900; color: var(--soil); margin-bottom: 6px;
}
.login-header p { font-size: .88rem; color: var(--muted); line-height: 1.5; }

/* Form fields */
.form-group { margin-bottom: 20px; }
.form-label {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: .85rem; color: var(--soil); margin-bottom: 8px;
}
.form-label .opt { font-weight: 400; color: var(--muted); font-size: .75rem; }

.field-input {
  width: 100%; padding: 15px 18px; border-radius: 14px;
  border: 2px solid var(--border); background: var(--white);
  font-family: var(--font-body); font-size: 1rem; color: var(--soil);
  transition: border-color .15s, box-shadow .15s; outline: none;
}
.field-input:focus {
  border-color: var(--clay);
  box-shadow: 0 0 0 3px rgba(193,68,14,.12);
}

/* Phone with prefix */
.phone-wrap {
  display: flex; align-items: center;
  border: 2px solid var(--border); border-radius: 14px;
  overflow: hidden; background: var(--white);
  transition: border-color .15s, box-shadow .15s;
}
.phone-wrap:focus-within {
  border-color: var(--clay);
  box-shadow: 0 0 0 3px rgba(193,68,14,.12);
}
.phone-prefix {
  padding: 0 16px; font-weight: 700; color: var(--muted);
  font-size: .95rem; border-right: 1px solid var(--border);
  height: 54px; display: flex; align-items: center;
  background: var(--sand); white-space: nowrap; flex-shrink: 0;
}
.phone-wrap input {
  flex: 1; border: none; background: transparent; outline: none;
  padding: 15px 16px; font-size: 1rem; color: var(--soil);
  font-family: var(--font-body);
}

/* Location status bar — auto-detected, read-only */
.loc-status-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--forest-pale); border: 1.5px solid var(--forest);
  border-radius: 12px; padding: 10px 14px;
  font-size: .82rem; color: var(--forest); font-weight: 600;
  margin-top: 4px; min-height: 42px;
  transition: all .3s;
}
.loc-status-bar.detecting {
  background: var(--saffron-pale); border-color: var(--saffron);
  color: #92400E;
}
.loc-status-bar.error {
  background: #FEE2E2; border-color: #FCA5A5; color: #991B1B;
}
.loc-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--forest); flex-shrink: 0;
  animation: loc-pulse 2s ease infinite;
}
.loc-status-bar.detecting .loc-dot { background: var(--saffron); }
.loc-status-bar.error .loc-dot { background: #DC2626; animation: none; }
@keyframes loc-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.4); opacity: .6; }
}

/* Submit button */
.login-btn {
  width: 100%; margin-top: 24px; padding: 18px;
  font-size: 1.05rem; font-weight: 700; border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, var(--clay), var(--clay-light));
  color: #fff; cursor: pointer;
  box-shadow: 0 6px 20px rgba(193,68,14,.35);
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  font-family: var(--font-body);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(193,68,14,.45); }
.login-btn:active { transform: scale(.97); }
.login-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }

.login-footer { text-align: center; margin-top: 20px; }
.login-footer a {
  font-size: .82rem; color: var(--clay);
  text-decoration: none; font-weight: 600;
}
.login-footer a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .login-card { padding: 32px 20px 28px; border-radius: 22px; }
}
</style>
{% endblock %}

{% block content %}
<div class="login-screen">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">🌾</div>
      <h2 id="lbl-title">Welcome to KaamMitr</h2>
      <p id="lbl-sub">Enter your details to get started</p>
    </div>

    <!-- Name -->
    <div class="form-group">
      <label class="form-label">
        <span>👤</span>
        <span id="lbl-name">Your Name</span>
        <span class="opt" id="lbl-opt">(Optional)</span>
      </label>
      <input class="field-input" id="inp-name"
             placeholder="Ramesh Kumar" autocomplete="name">
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label class="form-label">
        <span>📱</span>
        <span id="lbl-phone">Mobile Number</span>
        <span style="color:var(--clay);font-size:.8rem">*</span>
      </label>
      <div class="phone-wrap">
        <span class="phone-prefix">🇮🇳 +91</span>
        <input type="tel" id="inp-phone" maxlength="10"
               placeholder="9876543210" inputmode="numeric" autocomplete="tel">
      </div>
    </div>

    <!-- Location — auto-detected, no manual input -->
    <div class="form-group">
      <label class="form-label">
        <span>📍</span>
        <span id="lbl-loc">Location</span>
        <span class="opt" id="lbl-auto">(Auto-detecting...)</span>
      </label>
      <div class="loc-status-bar detecting" id="loc-bar">
        <div class="loc-dot"></div>
        <span id="loc-text">Detecting your location...</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <span id="lbl-btn">Get Started →</span>
    </button>

    <div class="login-footer">
      <a href="/language">🌐 <span id="lbl-change-lang">Change Language</span></a>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ── Language strings ──────────────────────────────────────────────
const LANG = {
  hi: {
    title:      'KaamMitr में आपका स्वागत है',
    sub:        'अपनी जानकारी भरें और शुरू करें',
    name:       'आपका नाम', opt: '(वैकल्पिक)',
    phone:      'मोबाइल नंबर',
    loc:        'लोकेशन', autoDetect: '(अपने आप पता लग रहा है...)',
    locDetecting: '📍 आपकी लोकेशन पता लग रही है...',
    locDone:    '📍 लोकेशन मिल गई: ',
    locErr:     '📍 लोकेशन नहीं मिली — आगे बढ़ सकते हैं',
    btn:        'शुरू करें →',
    loading:    'लोड हो रहा है...',
    phoneErr:   '10 अंक का नंबर डालें',
    namePh:     'राम कुमार',
    changeLang: 'भाषा बदलें'
  },
  en: {
    title:      'Welcome to KaamMitr',
    sub:        'Enter your details to get started',
    name:       'Your Name', opt: '(Optional)',
    phone:      'Mobile Number',
    loc:        'Location', autoDetect: '(Auto-detecting...)',
    locDetecting: '📍 Detecting your location...',
    locDone:    '📍 Location found: ',
    locErr:     '📍 Location not found — you can continue',
    btn:        'Get Started →',
    loading:    'Loading...',
    phoneErr:   'Enter a 10-digit number',
    namePh:     'Ramesh Kumar',
    changeLang: 'Change Language'
  },
  te: {
    title:      'KaamMitr కి స్వాగతం',
    sub:        'మీ వివరాలు నమోదు చేయండి',
    name:       'మీ పేరు', opt: '(ఐచ్ఛికం)',
    phone:      'మొబైల్ నంబర్',
    loc:        'స్థానం', autoDetect: '(స్వయంచాలకంగా గుర్తిస్తోంది...)',
    locDetecting: '📍 మీ స్థానాన్ని గుర్తిస్తోంది...',
    locDone:    '📍 స్థానం దొరికింది: ',
    locErr:     '📍 స్థానం దొరకలేదు — కొనసాగించవచ్చు',
    btn:        'ప్రారంభించండి →',
    loading:    'లోడ్ అవుతోంది...',
    phoneErr:   '10 అంకెల నంబర్ నమోదు చేయండి',
    namePh:     'రమేష్ కుమార్',
    changeLang: 'భాష మార్చండి'
  }
};

const lang = KM.getLang() || 'hi';
const s = LANG[lang] || LANG.en;

// Apply all strings
document.getElementById('lbl-title').textContent      = s.title;
document.getElementById('lbl-sub').textContent        = s.sub;
document.getElementById('lbl-name').textContent       = s.name;
document.getElementById('lbl-opt').textContent        = s.opt;
document.getElementById('lbl-phone').textContent      = s.phone;
document.getElementById('lbl-loc').textContent        = s.loc;
document.getElementById('lbl-auto').textContent       = s.autoDetect;
document.getElementById('lbl-btn').textContent        = s.btn;
document.getElementById('lbl-change-lang').textContent = s.changeLang;
document.getElementById('inp-name').placeholder       = s.namePh;
document.getElementById('loc-text').textContent       = s.locDetecting;

// ── Detected location stored here ────────────────────────────────
let detectedLocation = '';

// ── Silent GPS auto-detect ────────────────────────────────────────
function autoDetectLocation() {
  const bar  = document.getElementById('loc-bar');
  const txt  = document.getElementById('loc-text');

  if (!navigator.geolocation) {
    bar.className = 'loc-status-bar error';
    txt.textContent = s.locErr;
    return;
  }

  bar.className = 'loc-status-bar detecting';
  txt.textContent = s.locDetecting;

  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
        );
        const d = await r.json();
        const city  = d.address?.city || d.address?.town ||
                      d.address?.village || d.address?.county || '';
        const state = d.address?.state || '';
        detectedLocation = [city, state].filter(Boolean).join(', ');
        localStorage.setItem('km_location', city || detectedLocation);

        bar.className = 'loc-status-bar';
        txt.textContent = s.locDone + detectedLocation;
      } catch {
        // GPS coords available but reverse geocode failed
        detectedLocation = `${lat.toFixed(4)},${lng.toFixed(4)}`;
        bar.className = 'loc-status-bar';
        txt.textContent = s.locDone + detectedLocation;
      }
    },
    () => {
      // User denied or GPS unavailable — not a blocker
      bar.className = 'loc-status-bar error';
      txt.textContent = s.locErr;
    },
    { timeout: 8000, maximumAge: 60000 }
  );
}

// ── Login ─────────────────────────────────────────────────────────
async function doLogin() {
  const rawPhone = document.getElementById('inp-phone').value.trim().replace(/\s/g, '');
  const name     = document.getElementById('inp-name').value.trim();

  if (!rawPhone || rawPhone.length < 10) {
    KM.toast(s.phoneErr, 'error');
    document.getElementById('inp-phone').focus();
    return;
  }

  const phone = rawPhone.startsWith('91') ? rawPhone : '91' + rawPhone;
  const btn   = document.getElementById('login-btn');
  btn.disabled = true;
  document.getElementById('lbl-btn').textContent = s.loading;

  const r = await KM.api('POST', '/api/auth/login', {
    phone,
    name,
    location: detectedLocation
  });

  if (r.success) {
    KM.setPhone(r.data.phone);
    KM.setLang(lang);
    if (name) localStorage.setItem('km_name', name);
    window.location.href = '/home';
  } else {
    KM.toast(r.message || 'Error occurred', 'error');
    btn.disabled = false;
    document.getElementById('lbl-btn').textContent = s.btn;
  }
}

// Enter key submits
document.getElementById('inp-phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('inp-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-phone').focus();
});

// Pre-fill returning user phone
const saved = KM.getPhone();
if (saved) {
  const num = saved.startsWith('91') ? saved.slice(2) : saved;
  document.getElementById('inp-phone').value = num;
}

// Start GPS detection immediately on page load
autoDetectLocation();
</script>
{% endblock %}
