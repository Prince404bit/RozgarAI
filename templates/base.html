<!DOCTYPE html>
<html lang="hi" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#C1440E">
  <title>{% block title %}KaamMitr — Kaam Dhundho, Paise Kamao{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar" id="main-nav">
  <a href="/home" class="navbar-brand">
    <div class="brand-leaf">🌾</div>
    KaamMitr
    <span style="font-size:.58rem;font-weight:800;background:#16a34a;color:#fff;padding:2px 7px;border-radius:100px;letter-spacing:.5px;margin-left:2px">LIVE</span>
  </a>

  <div class="navbar-links" id="nav-links">
    <a href="/home"      id="nav-home">Home</a>
    <a href="/jobs"      id="nav-jobs">Jobs</a>
    <a href="/chat"      id="nav-chat">Chat</a>
    <a href="/profile"   id="nav-profile">Profile</a>
    <a href="/dashboard" id="nav-dash">Dashboard</a>
    <a href="/employer-login" id="nav-employer"
       style="font-weight:700;color:var(--forest);padding:8px 12px;border-radius:10px;
              background:var(--forest-pale);transition:background .15s;"
       onclick="handleEmpNav(event)">
      🏢 <span id="nav-emp-lbl">Employer</span>
    </a>
    <a href="#" id="notif-bell"
       style="position:relative;padding:8px 10px;border-radius:10px;font-size:.82rem;font-weight:600;color:var(--muted);transition:background .15s,color .15s;"
       title="Notifications">
      🔔
      <span id="notif-badge"
        style="display:none;position:absolute;top:2px;right:2px;
               background:#DC2626;color:#fff;border-radius:50%;
               width:16px;height:16px;font-size:.58rem;font-weight:700;
               align-items:center;justify-content:center;line-height:1;">0</span>
    </a>
  </div>

  <div class="nav-lang-pill" id="nav-lang-pill">
    <button class="nlp-btn" id="nlp-hi" onclick="switchLang('hi')">हि</button>
    <button class="nlp-btn" id="nlp-en" onclick="switchLang('en')">En</button>
    <button class="nlp-btn" id="nlp-te" onclick="switchLang('te')">తె</button>
  </div>
</nav>

{% block content %}{% endblock %}

<div id="km-toast"><span class="t-icon">✦</span><span class="t-msg"></span></div>
<script src="/static/js/app.js"></script>

<script>
// ── 1. Language guard ─────────────────────────────────────────────
(function () {
  const EXEMPT = ['/language', '/lang', '/static'];
  const path = window.location.pathname;
  const isExempt = EXEMPT.some(p => path === p || path.startsWith(p + '/'));
  if (!isExempt && !localStorage.getItem('km_lang')) {
    window.location.replace('/language?next=' + encodeURIComponent(path + window.location.search));
  }
})();

// ── 2. Nav label translations ─────────────────────────────────────
const NAV_L = {
  hi: { home: 'होम', jobs: 'नौकरियाँ', chat: 'चैट', profile: 'प्रोफाइल', dash: 'डैशबोर्ड', emp: 'नियोक्ता' },
  en: { home: 'Home', jobs: 'Jobs',     chat: 'Chat', profile: 'Profile',   dash: 'Dashboard',  emp: 'Employer' },
  te: { home: 'హోమ్', jobs: 'ఉద్యోగాలు', chat: 'చాట్', profile: 'ప్రొఫైల్', dash: 'డాష్బోర్డ్', emp: 'నియోగదాత' }
};

function applyNavLang(l) {
  const lb = NAV_L[l] || NAV_L.en;
  document.getElementById('nav-home').textContent    = lb.home;
  document.getElementById('nav-jobs').textContent    = lb.jobs;
  document.getElementById('nav-chat').textContent    = lb.chat;
  document.getElementById('nav-profile').textContent = lb.profile;
  document.getElementById('nav-dash').textContent    = lb.dash;
  const empEl = document.getElementById('nav-emp-lbl');
  if (empEl) empEl.textContent = lb.emp;
  ['hi', 'en', 'te'].forEach(c =>
    document.getElementById('nlp-' + c)?.classList.toggle('active', c === l));
  document.getElementById('html-root').lang = l === 'hi' ? 'hi' : l === 'te' ? 'te' : 'en';
}

function switchLang(l) {
  localStorage.removeItem('km_lang');
  window.location.href = '/language?next=' + encodeURIComponent(window.location.pathname + window.location.search);
}

// ── 3. Wire nav links with saved phone ───────────────────────────
const _ph = KM.getPhone();
if (_ph) {
  const ce = document.getElementById('nav-chat');
  const pe = document.getElementById('nav-profile');
  if (ce) ce.href = '/chat?phone=' + _ph;
  if (pe) pe.href = '/profile?phone=' + _ph;
}

// Smart employer nav: go to dashboard if already logged in as employer
function handleEmpNav(e) {
  const empPhone = localStorage.getItem('km_emp_phone');
  if (empPhone) {
    e.preventDefault();
    window.location.href = '/employer?phone=' + encodeURIComponent(empPhone);
  }
  // else follow href to /employer-login normally
}

applyNavLang(KM.getLang() || 'hi');

// ── 4. Notification badge — poll every 30s ────────────────────────
async function updateNotifBadge() {
  const phone = KM.getPhone();
  if (!phone) return;
  try {
    const r = await KM.api('GET', '/api/user/applications?phone=' + phone);
    const badge = document.getElementById('notif-badge');
    if (!badge) return;
    const count = (r.data || []).filter(a => a.status === 'applied').length;
    badge.textContent = count > 9 ? '9+' : count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  updateNotifBadge();
  setInterval(updateNotifBadge, 30000);
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
